<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Quiz-a-Day Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B9D;
            --secondary: #C44569;
            --accent-1: #4ECDC4;
            --accent-2: #FFE66D;
            --accent-3: #95E1D3;
            --accent-4: #F38181;
            --accent-5: #AA96DA;
            --dark-bg: #1a1a2e;
            --darker-bg: #0f0f1e;
            --card-bg: #16213e;
            --text-light: #eaeaea;
            --text-secondary: #b0b0b0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--darker-bg) 100%);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3.5em;
            font-weight: 900;
            background: linear-gradient(45deg, var(--primary), var(--accent-2), var(--accent-1));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 107, 157, 0.1);
            border: 2px solid var(--primary);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-card.accent-1 {
            border-color: var(--accent-1);
            background: rgba(78, 205, 196, 0.1);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .stat-card.accent-1 .stat-number {
            color: var(--accent-1);
        }

        .stat-label {
            font-size: 0.9em;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-weight: bold;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .section {
            background: var(--card-bg);
            border: 2px solid rgba(255, 107, 157, 0.3);
            border-radius: 16px;
            padding: 30px;
        }

        .section h2 {
            font-size: 1.8em;
            margin-bottom: 20px;
            color: var(--accent-1);
            font-weight: 700;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--accent-2);
            text-transform: uppercase;
            font-size: 0.85em;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        textarea,
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(78, 205, 196, 0.3);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-light);
            font-size: 1em;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--accent-1);
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.3);
            background: rgba(0, 0, 0, 0.5);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .answer-group {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .answer-group label {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .answer-group input[type="radio"] {
            width: auto;
            margin-right: 10px;
            cursor: pointer;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: linear-gradient(45deg, var(--accent-1), var(--accent-3));
            color: var(--darker-bg);
        }

        .btn-danger {
            background: linear-gradient(45deg, var(--accent-4), #FF6B6B);
            color: white;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.8em;
            margin-right: 5px;
        }

        .questions-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .questions-table th {
            background: rgba(78, 205, 196, 0.2);
            padding: 15px;
            text-align: left;
            font-weight: bold;
            color: var(--accent-1);
            border-bottom: 2px solid var(--accent-1);
            text-transform: uppercase;
            font-size: 0.85em;
        }

        .questions-table td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 107, 157, 0.1);
        }

        .category-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
        }

        .category-sport { background: rgba(255, 107, 157, 0.3); color: var(--primary); }
        .category-histoire { background: rgba(170, 150, 218, 0.3); color: var(--accent-5); }
        .category-sciences { background: rgba(243, 129, 129, 0.3); color: var(--accent-4); }
        .category-pop { background: rgba(255, 230, 109, 0.3); color: var(--accent-2); }
        .category-jeux { background: rgba(78, 205, 196, 0.3); color: var(--accent-1); }
        .category-musique { background: rgba(149, 225, 211, 0.3); color: var(--accent-3); }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .login-box {
            background: var(--card-bg);
            border: 2px solid var(--primary);
            border-radius: 16px;
            padding: 50px;
            width: 100%;
            max-width: 400px;
        }

        .login-box h1 {
            font-size: 2.5em;
            margin-bottom: 30px;
        }

        .success-message {
            background: rgba(78, 205, 196, 0.2);
            border-left: 4px solid var(--accent-1);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: var(--accent-1);
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border: 2px solid var(--accent-1);
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .close-modal {
            float: right;
            font-size: 2em;
            font-weight: bold;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .difficulty-options {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .difficulty-options label {
            margin-bottom: 0;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 2.5em;
            }
        }
    </style>
</head>
<body>
    <div class="stars-bg" id="starsBg"></div>

    <!-- LOGIN -->
    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <h1>🎮 Quiz-a-Day</h1>
            <p class="subtitle" style="margin-bottom: 30px;">Admin Panel</p>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="admin@quiz.com">
            </div>

            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>

            <div class="form-group">
                <label style="color: var(--text-secondary); font-size: 0.8em;">
                    <input type="checkbox" id="isSignup"> Créer un compte
                </label>
            </div>

            <button class="btn btn-primary" style="width: 100%; font-size: 1.1em; padding: 15px;" onclick="auth()">
                Se connecter
            </button>

            <p id="status" style="margin-top: 20px; font-size: 0.9em; color: #FFE66D; text-align: center;">
                ⏳ Chargement...
            </p>
        </div>
    </div>

    <!-- APP -->
    <div id="mainApp" style="display: none;">
        <div class="container">
            <header>
                <h1>🎮 Quiz-a-Day Admin</h1>
                <p class="subtitle">Gère tes questions</p>
                <button class="btn btn-secondary btn-small" onclick="logout()" style="margin-top: 15px;">
                    Logout
                </button>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalQuestions">0</div>
                    <div class="stat-label">Questions</div>
                </div>
            </div>

            <div class="main-grid">
                <div class="section">
                    <h2>➕ Ajouter Question</h2>
                    <div class="success-message" id="successMessage">✓ Question ajoutée!</div>

                    <div class="form-group">
                        <label>Question</label>
                        <textarea id="questionText" placeholder="Qui a...?"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Catégorie</label>
                        <select id="questionCategory">
                            <option value="Sport">⚽ Sport</option>
                            <option value="Histoire">📚 Histoire</option>
                            <option value="Sciences">🔬 Sciences</option>
                            <option value="Pop Culture">🎬 Pop Culture</option>
                            <option value="Jeu vidéo">🎮 Jeu vidéo</option>
                            <option value="Musique">🎵 Musique</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Difficulté</label>
                        <div class="difficulty-options">
                            <label><input type="radio" name="difficulty" value="easy"> 🟢 Facile</label>
                            <label><input type="radio" name="difficulty" value="medium" checked> 🟡 Moyen</label>
                            <label><input type="radio" name="difficulty" value="hard"> 🔴 Difficile</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Réponses</label>
                        <div class="answer-group">
                            <label><input type="radio" name="correctAnswer" value="0"> <input type="text" id="answer0" placeholder="Réponse A" style="margin: 0; width: calc(100% - 30px);"></label>
                        </div>
                        <div class="answer-group">
                            <label><input type="radio" name="correctAnswer" value="1"><input type="text" id="answer1" placeholder="Réponse B" style="margin: 0; width: calc(100% - 30px);"></label>
                        </div>
                        <div class="answer-group">
                            <label><input type="radio" name="correctAnswer" value="2"><input type="text" id="answer2" placeholder="Réponse C" style="margin: 0; width: calc(100% - 30px);"></label>
                        </div>
                        <div class="answer-group">
                            <label><input type="radio" name="correctAnswer" value="3"><input type="text" id="answer3" placeholder="Réponse D" style="margin: 0; width: calc(100% - 30px);"></label>
                        </div>
                    </div>

                    <button class="btn btn-primary" onclick="addQuestion()" style="width: 100%; margin-top: 20px;">✨ Ajouter</button>
                </div>

                <div class="section">
                    <h2>📊 Actions</h2>
                    <button class="btn btn-secondary" onclick="exportQuestions()" style="width: 100%; margin-top: 10px;">📥 Exporter JSON</button>
                </div>
            </div>

            <div class="section">
                <h2>📝 Questions</h2>
                <table class="questions-table">
                    <thead>
                        <tr>
                            <th style="width: 60%;">Question</th>
                            <th>Catégorie</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="questionsBody">
                        <tr><td colspan="3" style="text-align: center;">Aucune question...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeEditModal()">&times;</span>
            <h2 style="margin-bottom: 20px;">✏️ Éditer</h2>
            <div class="form-group">
                <label>Question</label>
                <textarea id="editQuestionText"></textarea>
            </div>
            <div class="form-group">
                <label>Catégorie</label>
                <select id="editCategory">
                    <option value="Sport">⚽ Sport</option>
                    <option value="Histoire">📚 Histoire</option>
                    <option value="Sciences">🔬 Sciences</option>
                    <option value="Pop Culture">🎬 Pop Culture</option>
                    <option value="Jeu vidéo">🎮 Jeu vidéo</option>
                    <option value="Musique">🎵 Musique</option>
                </select>
            </div>
            <div class="form-group">
                <label>Réponses</label>
                <div class="answer-group">
                    <label><input type="radio" name="editCorrectAnswer" value="0"><input type="text" id="editAnswer0" style="margin: 0; width: calc(100% - 30px);"></label>
                </div>
                <div class="answer-group">
                    <label><input type="radio" name="editCorrectAnswer" value="1"><input type="text" id="editAnswer1" style="margin: 0; width: calc(100% - 30px);"></label>
                </div>
                <div class="answer-group">
                    <label><input type="radio" name="editCorrectAnswer" value="2"><input type="text" id="editAnswer2" style="margin: 0; width: calc(100% - 30px);"></label>
                </div>
                <div class="answer-group">
                    <label><input type="radio" name="editCorrectAnswer" value="3"><input type="text" id="editAnswer3" style="margin: 0; width: calc(100% - 30px);"></label>
                </div>
            </div>
            <div style="margin-top: 20px;">
                <button class="btn btn-primary" onclick="saveEditQuestion()" style="margin-right: 10px;">💾 Sauvegarder</button>
                <button class="btn btn-danger" onclick="deleteQuestion()" style="margin-right: 10px;">🗑️ Supprimer</button>
                <button class="btn btn-secondary" onclick="closeEditModal()">Annuler</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://jksnsxxedyzewxylusxy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imprc25zeHhlZHl6ZXd4eWx1c3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwODU5MjYsImV4cCI6MjA5MTY2MTkyNn0.ujKCZQ70BKiSEwkOPMvktUsKhGC87-WVi0xFWYotG6E';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        document.getElementById('status').innerHTML = '✅ Supabase prêt!';
        document.getElementById('status').style.color = '#4ECDC4';

        let currentEditId = null;
        let allQuestions = [];

        function createStars() {
            const bg = document.getElementById('starsBg');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                bg.appendChild(star);
            }
        }

        async function auth() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const isSignup = document.getElementById('isSignup').checked;

            if (!email || !password) {
                alert('Email et mot de passe requis!');
                return;
            }

            try {
                if (isSignup) {
                    await supabase.auth.signUp({ email, password });
                } else {
                    await supabase.auth.signInWithPassword({ email, password });
                }
                showMainApp();
            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        }

        async function logout() {
            await supabase.auth.signOut();
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
        }

        function showMainApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            loadQuestions();
        }

        async function addQuestion() {
            const text = document.getElementById('questionText').value;
            const category = document.getElementById('questionCategory').value;
            const difficulty = document.querySelector('input[name="difficulty"]:checked').value;
            const correctAnswer = parseInt(document.querySelector('input[name="correctAnswer"]:checked').value);
            const answers = [
                document.getElementById('answer0').value,
                document.getElementById('answer1').value,
                document.getElementById('answer2').value,
                document.getElementById('answer3').value
            ];

            if (!text || !category || !difficulty || answers.some(a => !a) || correctAnswer === undefined) {
                alert('Tous les champs requis!');
                return;
            }

            try {
                await supabase.from('questions').insert({ text, category, difficulty, answers, correct_answer: correctAnswer });
                document.getElementById('questionText').value = '';
                ['answer0','answer1','answer2','answer3'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('successMessage').classList.add('show');
                setTimeout(() => document.getElementById('successMessage').classList.remove('show'), 3000);
                loadQuestions();
            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        }

        function openEditModal(id) {
            currentEditId = id;
            const q = allQuestions.find(x => x.id === id);
            if (!q) return;
            document.getElementById('editQuestionText').value = q.text;
            document.getElementById('editCategory').value = q.category;
            document.getElementById('editAnswer0').value = q.answers[0];
            document.getElementById('editAnswer1').value = q.answers[1];
            document.getElementById('editAnswer2').value = q.answers[2];
            document.getElementById('editAnswer3').value = q.answers[3];
            document.querySelector(`input[name="editCorrectAnswer"][value="${q.correct_answer}"]`).checked = true;
            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        async function saveEditQuestion() {
            const text = document.getElementById('editQuestionText').value;
            const category = document.getElementById('editCategory').value;
            const correctAnswer = parseInt(document.querySelector('input[name="editCorrectAnswer"]:checked').value);
            const answers = [
                document.getElementById('editAnswer0').value,
                document.getElementById('editAnswer1').value,
                document.getElementById('editAnswer2').value,
                document.getElementById('editAnswer3').value
            ];

            try {
                await supabase.from('questions').update({ text, category, answers, correct_answer: correctAnswer }).eq('id', currentEditId);
                closeEditModal();
                loadQuestions();
            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        }

        async function deleteQuestion() {
            if (!confirm('Supprimer?')) return;
            try {
                await supabase.from('questions').delete().eq('id', currentEditId);
                closeEditModal();
                loadQuestions();
            } catch (error) {
                alert('Erreur: ' + error.message);
            }
        }

        async function loadQuestions() {
            try {
                const { data } = await supabase.from('questions').select('*');
                allQuestions = data || [];
                const tbody = document.getElementById('questionsBody');
                tbody.innerHTML = '';

                allQuestions.forEach(q => {
                    const catClass = `category-${q.category.toLowerCase().replace(/\s+/g, '')}`;
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${q.text}</td>
                        <td><span class="category-badge ${catClass}">${q.category}</span></td>
                        <td><button class="btn btn-secondary btn-small" onclick="openEditModal('${q.id}')">✏️</button></td>
                    `;
                    tbody.appendChild(row);
                });

                document.getElementById('totalQuestions').textContent = allQuestions.length;
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function exportQuestions() {
            const data = { exported: new Date().toISOString(), questions: allQuestions };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `quiz-questions-${Date.now()}.json`;
            a.click();
        }

        createStars();
        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                showMainApp();
            }
        });
    </script>
</body>
</html>
